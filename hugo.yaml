  #Contact
  contact:
    enable: true
    # title: "Custom Name"
    content: For now, find me on LinkedIn and send me a message. Mention this space or something relevant.
    btnName: LinkedIn
    btnLink: https://www.linkedin.com/in/jvbond/

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: Recent Posts
      enable: true
      disableFeaturedImage: false
    socialNetworks:
      github: https://github.com/jvbond
      linkedin: https://www.linkedin.com/in/jvbond/
      twitter: https://twitter.com/jvbond

  # List pages like blogs and posts
